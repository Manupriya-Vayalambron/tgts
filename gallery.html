<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gallery | TGTS</title>
  <meta name="description" content="A visual gallery of soil testing and laboratory work at TGTS.">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    :root {
      --blue:#0a4fa3;
      --ink:#17212b;
      --muted:#5a6775;
      --line:#d9e7fb;
      --bg:#f6f9ff;
      --white:#ffffff;
    }
    * { box-sizing:border-box; margin:0; padding:0; }
    html { scroll-behavior:smooth; }
    body {
      font-family:'Inter',sans-serif;
      color:var(--ink);
      background:
        radial-gradient(circle at top left, rgba(15,105,207,.10), transparent 28%),
        radial-gradient(circle at 85% 10%, rgba(10,79,163,.10), transparent 22%),
        var(--bg);
      line-height:1.6;
    }
    header {
      position:sticky; top:0; z-index:100;
      background:rgba(255,255,255,.92);
      backdrop-filter:blur(10px);
      border-bottom:1px solid var(--line);
    }
    .header-inner {
      max-width:1180px;
      margin:0 auto;
      padding:1rem 1.5rem;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:1rem;
    }
    .logo-container {
      display:inline-flex;
      align-items:center;
      text-decoration:none;
      transition:transform .2s ease, opacity .2s ease;
    }
    .logo-container:hover { transform:scale(1.02); opacity:.95; }
    .logo-container img {
      width:48px;
      height:48px;
      display:block;
      object-fit:contain;
      filter:brightness(0) saturate(100%) invert(26%) sepia(86%) saturate(1705%) hue-rotate(194deg) brightness(92%) contrast(101%);
    }
    .back-btn {
      display:inline-flex;
      align-items:center;
      gap:.55rem;
      color:var(--blue);
      text-decoration:none;
      font-weight:700;
      transition:transform .2s ease, opacity .2s ease;
      white-space:nowrap;
    }
    .back-btn:hover { transform:translateX(-4px); opacity:.92; }
    .page-title {
      max-width:1180px;
      margin:0 auto;
      padding:2rem 1.5rem 1rem;
    }
    .page-title h1 {
      font-size:1.9rem;
      line-height:1.15;
      color:var(--blue);
      margin-bottom:.4rem;
    }
    .gallery-wrap { width:100%; margin:0 auto; padding:0 1rem 3.5rem; }
    .gallery-grid {
      display:grid;
      grid-template-columns:repeat(12, minmax(0, 1fr));
      grid-auto-rows:10px;
      grid-auto-flow:dense;
      gap:1rem;
      width:100%;
    }
    .gallery-card {
      background:var(--white);
      border:1px solid var(--line);
      border-radius:24px;
      overflow:visible;
      box-shadow:0 10px 24px rgba(18,35,61,.06);
      transition:transform .2s ease, box-shadow .2s ease;
      grid-column:span 4;
      padding:8px;
      position:relative;
    }
    .tile-office1 { grid-column:span 5; }
    .tile-office2 { grid-column:span 7; }
    .tile-laboratory { grid-column:span 6; }
    .tile-reception { grid-column:span 6; }
    .tile-hydrometer { grid-column:span 4; }
    .tile-gravity { grid-column:span 4; }
    .tile-water { grid-column:span 4; }
    .gallery-card:hover { transform:translateY(-4px); box-shadow:0 16px 34px rgba(18,35,61,.12); }
    .gallery-frame {
      position:relative;
      border-radius:18px;
      overflow:hidden;
      background:#eef4fc;
    }
    .gallery-card img {
      width:100%;
      height:auto;
      display:block;
      max-height:68vh;
      object-fit:contain;
      background:#eef4fc;
    }
    .gallery-name {
      position:absolute;
      left:10px;
      bottom:10px;
      display:inline-flex;
      align-items:center;
      max-width:calc(100% - 20px);
      padding:.42rem .72rem;
      border-radius:999px;
      background:rgba(10,79,163,.88);
      color:#fff;
      font-size:.78rem;
      line-height:1.2;
      font-weight:600;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      letter-spacing:.02em;
      text-transform:uppercase;
    }
    footer {
      background:rgba(255,255,255,.92);
      border-top:1px solid var(--line);
      color:var(--muted);
      text-align:center;
      padding:1.2rem 1rem;
      font-size:.9rem;
    }
    @media (max-width: 900px) {
      .gallery-grid { grid-template-columns:repeat(2, minmax(0, 1fr)); }
      .gallery-card,
      .tile-office1,
      .tile-office2,
      .tile-laboratory,
      .tile-reception,
      .tile-hydrometer,
      .tile-gravity,
      .tile-water {
        grid-column:span 1;
      }
      .gallery-card img { max-height:none; }
    }
    @media (max-width: 600px) {
      .header-inner, .page-title, .gallery-wrap, footer { padding-left:1rem; padding-right:1rem; }
      .gallery-card { border-radius:20px; }
      .gallery-grid { grid-template-columns:1fr; }
      .gallery-name { font-size:.74rem; }
      .logo-container img { width:42px; height:42px; }
    }
  </style>
</head>
<body>
  <header>
    <div class="header-inner">
      <a href="index.html" class="logo-container" aria-label="TGTS Home">
        <img src="assets/tgt-logo.png" alt="TGTS Logo">
      </a>
      <a href="index.html" class="back-btn"><i class="fas fa-arrow-left"></i> Back to Home</a>
    </div>
  </header>

  <main>
    <section class="page-title">
      <h1>Gallery</h1>
    </section>

    <section class="gallery-wrap">
      <div class="gallery-grid">
        <article class="gallery-card tile-office1">
          <div class="gallery-frame">
            <img src="assets/gallery/office1.jpeg" alt="Office Room 1">
            <span class="gallery-name">Office Room 1</span>
          </div>
        </article>
        <article class="gallery-card tile-office2">
          <div class="gallery-frame">
            <img src="assets/gallery/office 2.jpeg" alt="Office Room 2">
            <span class="gallery-name">Office Room 2</span>
          </div>
        </article>
        <article class="gallery-card tile-laboratory">
          <div class="gallery-frame">
            <img src="assets/gallery/lab2.jpeg" alt="Laboratory">
            <span class="gallery-name">Laboratory</span>
          </div>
        </article>
        <article class="gallery-card tile-reception">
          <div class="gallery-frame">
            <img src="assets/gallery/reception.jpeg" alt="Reception">
            <span class="gallery-name">Reception</span>
          </div>
        </article>
        <article class="gallery-card tile-hydrometer">
          <div class="gallery-frame">
            <img src="assets/gallery/hydrometeranalysis.jpeg" alt="Hydrometer Analysis">
            <span class="gallery-name">Hydrometer Analysis</span>
          </div>
        </article>
        <article class="gallery-card tile-gravity">
          <div class="gallery-frame">
            <img src="assets/gallery/specificgravitytest.jpeg" alt="Specific Gravity Test">
            <span class="gallery-name">Specific Gravity Test</span>
          </div>
        </article>
        <article class="gallery-card tile-water">
          <div class="gallery-frame">
            <img src="assets/gallery/watercontentanalysis.jpeg" alt="Water Content Analysis">
            <span class="gallery-name">Water Content Analysis</span>
          </div>
        </article>
      </div>
    </section>
  </main>

  <footer>
    © 2026 Trivandrum Geotechnical Testing and Solutions · tgts.in
  </footer>

  <script>
    const galleryGrid = document.querySelector('.gallery-grid');
    const galleryCards = document.querySelectorAll('.gallery-card');

    function setMasonrySpans() {
      if (!galleryGrid) return;

      const rowSize = parseFloat(window.getComputedStyle(galleryGrid).getPropertyValue('grid-auto-rows'));
      const gapSize = parseFloat(window.getComputedStyle(galleryGrid).getPropertyValue('row-gap'));
      if (!rowSize) return;

      galleryCards.forEach((card) => {
        const frame = card.querySelector('.gallery-frame');
        if (!frame) return;
        const totalHeight = frame.getBoundingClientRect().height;
        const span = Math.ceil((totalHeight + gapSize) / (rowSize + gapSize));
        card.style.gridRowEnd = 'span ' + span;
      });
    }

    window.addEventListener('load', setMasonrySpans);
    window.addEventListener('resize', setMasonrySpans);
  </script>

</body>
</html>
